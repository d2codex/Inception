; defines pool name (default pool)
[www]

; we only need 1 pool - user and group
; this controls which linux user runs the PHP worker processes
user = www-data
group = www-data

; tells PHP-FPM where to accept FastCGI requests
; nginx -> (FastCGI) ->php-fpm:9000
listen = 9000

pm = dynamic
pm.max_children = 5
pm.start_servers = 2
