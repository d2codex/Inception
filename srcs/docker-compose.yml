#flow: make up
# -> build images -> create containers -> create network
# -> create volumes -> start containers

# network config:
#   browser talks to nginx
#   nginx talks to wordpress
#   wordpress talks to mariadb

services:

  mariadb:
    build:
      context: ./requirements/mariadb
    image: mariadb
    env_file:
      - .env
    secrets:
      - db_password
      - db_root_password
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
    restart: unless-stopped

  wordpress:
    build:
      context: ./requirements/wordpress
    image: wordpress
    env_file:
      - .env
    secrets:
      - db_password
      - wp_admin_password
      - wp_user_password
    depends_on:
      - mariadb
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception
    restart: unless-stopped

  nginx:
    build:
    # Build the image from the local Dockerfile located in
    # ./requirements/nginx and tag the resulting image as "nginx".
    # Because a build context is provided, Docker Compose builds the
    # image locally instead of pulling nginx from Docker Hub.
      context: ./requirements/nginx
    image: nginx
    depends_on:
      - wordpress
    ports:
      - "443:443"
    networks:
      - inception
    restart: unless-stopped

# Docker network for internal communication
# Containers communicate using service names:
# nginx -> wordpress -> mariadb
networks:
  inception:

# Docker named volumes
# Persistent data stored outside containers
volumes:

  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOME}/data/mariadb

  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOME}/data/wordpress

# Docker secrets
# Sensitive information is stored outside the repository
secrets:

  db_password:
    file: ../secrets/db_password.txt

  db_root_password:
    file: ../secrets/db_root_password.txt

  wp_admin_password:
    file: ../secrets/wp_admin_password.txt

  wp_user_password:
    file: ../secrets/wp_user_password.txt
